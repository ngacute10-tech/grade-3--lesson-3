

 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary Practice</title>

<style>
body{
    font-family: Arial;
    background:#eef3ff;
    text-align:center;
}

.container{
    max-width:400px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:15px;
}

img{
    width:200px;
    height:200px;
    border-radius:10px;
}

button{
    margin:5px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#4CAF50;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#45a049;
}

.result{
    margin-top:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

    <h2 id="word">on</h2>
    <p id="ipa">/ɒn/</p>

    <img id="image" src="images/on.jpg">

    <br>

    <button onclick="playAudio()">🔊 Listen</button>
    <button onclick="startSpeak()">🎤 Speak</button>
    <button onclick="checkAnswer()">✅ Check</button>
    <button onclick="nextWord()">⏭️ Next</button>

    <p id="spokenText"></p>
    <p class="result" id="result"></p>

    <p>Score: <span id="score">0</span></p>

</div>

<script>

const vocab = [
    {word:"on", ipa:"/ɒn/", img:"images/on.jpg", audio:"audio/on.mp3"},
    {word:"in", ipa:"/ɪn/", img:"images/in.jpg", audio:"audio/in.mp3"},
    {word:"under", ipa:"/ˈʌndər/", img:"images/under.jpg", audio:"audio/under.mp3"},
    {word:"toy box", ipa:"/ˈtɔɪ bɒks/", img:"images/toybox.jpg", audio:"audio/toybox.mp3"},
    {word:"wardrobe", ipa:"/ˈwɔːdrəʊb/", img:"images/wardrobe.jpg", audio:"audio/wardrobe.mp3"}
];

let current = 0;
let spoken = "";
let score = localStorage.getItem("score") || 0;

document.getElementById("score").innerText = score;

function loadWord(){
    let item = vocab[current];
    document.getElementById("word").innerText = item.word;
    document.getElementById("ipa").innerText = item.ipa;
    document.getElementById("image").src = item.img;
    document.getElementById("spokenText").innerText = "";
    document.getElementById("result").innerText = "";
}

function playAudio(){
    let audio = new Audio(vocab[current].audio);
    audio.play();
}

function startSpeak(){
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "en-US";

    recognition.start();

    recognition.onresult = function(event){
        spoken = event.results[0][0].transcript.toLowerCase();
        document.getElementById("spokenText").innerText = "You said: " + spoken;
    }
}

function checkAnswer(){
    let correct = vocab[current].word.toLowerCase();

    if(spoken.includes(correct)){
        document.getElementById("result").innerText = "✅ Correct!";
        score++;
    }else{
        document.getElementById("result").innerText = "❌ Try again!";
    }

    localStorage.setItem("score", score);
    document.getElementById("score").innerText = score;
}

function nextWord(){
    current++;
    if(current >= vocab.length){
        alert("🎉 Finished! Your score: " + score);
        current = 0;
    }
    loadWord();
}

loadWord();

</script>

</body>
</html>
